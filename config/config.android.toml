[agent]
max_iterations = 20
context_window = 32768
history_share = 0.7
data_dir = "/data/local/tmp/peko"
log_level = "info"

[provider]
# Dual-brain: local = peko-llm-daemon over UDS, cloud = Anthropic for escalation.
brain    = "local:anthropic"
priority = ["anthropic"]

# Local brain — connects to peko-llm-daemon over Unix Domain Socket (abstract namespace).
# The daemon must be running and bound to @peko-llm:
#   ./peko-llm-daemon --model <path> --socket @peko-llm &
[provider.local]
model    = "embedded"
base_url = "unix://@peko-llm"
max_tokens = 512

# Cloud brain — escalation target (requires ANTHROPIC_API_KEY env var).
[provider.anthropic]
model      = "claude-sonnet-4-20250514"
max_tokens = 4096

[tools]
screenshot      = true
touch           = true
key_event       = true
text_input      = true
ui_inspect      = true
shell           = true
filesystem      = true
package_manager = true
memory          = true
skills          = true

[tools.filesystem_config]
allowed_paths = ["/data/local/tmp/peko", "/sdcard"]

[tools.shell_config]
timeout_seconds = 30

# Phase A autonomy shakedown — propose-only, 60s heartbeat so proposals
# appear within a minute instead of 5. Bump tick_interval_secs back to 300
# (or remove the whole block) once validated.
[autonomy]
enabled             = true
tick_interval_secs  = 60
max_internal_tasks_per_hour = 6
max_internal_tasks_per_day  = 30
max_tokens_per_day          = 50000
propose_only        = true
memory_gardener     = true
memory_gardener_cron = "0 6 * * *"
reflection          = true
curiosity           = 0.10
goal_generation     = true
