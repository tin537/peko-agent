[agent]
max_iterations = 20
context_window = 32768
history_share  = 0.7
data_dir       = "/data/peko"
log_level      = "info"

[provider]
# Dual brain: local daemon (UDS) + cloud chain for escalation.
# Chain format: "local:cloud1,cloud2,cloud3" — tries cloud1 first, falls
# back to cloud2 if it fails (rate limit, network, bad key), etc.
# Uncomment just one of these, or edit to taste.
brain    = "local:anthropic,openrouter"
# brain  = "local:anthropic"                     # single cloud
# brain  = "local:openai,anthropic"              # OpenAI primary, Anthropic fallback
# brain  = "local:groq,deepseek,openrouter"      # all 3 cheap options with fallback
# brain  = "anthropic,openrouter"                # cloud-only with fallback (no local)
priority = ["anthropic"]

[provider.local]
model      = "embedded"
base_url   = "unix://@peko-llm"
max_tokens = 512

# ── Cloud providers ─────────────────────────────────────
# Each is optional. Any provider without an api_key (and no matching env
# var) is silently skipped when building the brain chain.
# API keys can come from the field below OR from env vars set in service.sh:
#   ANTHROPIC_API_KEY  OPENROUTER_API_KEY  OPENAI_API_KEY
#   GROQ_API_KEY       DEEPSEEK_API_KEY    MISTRAL_API_KEY
#   TOGETHER_API_KEY

[provider.anthropic]
model      = "claude-sonnet-4-20250514"
max_tokens = 4096
# api_key  = "sk-ant-..."

[provider.openrouter]
model      = "anthropic/claude-sonnet-4"
max_tokens = 4096
# api_key  = "sk-or-..."

# [provider.openai]
# model      = "gpt-4o-mini"
# max_tokens = 4096
# api_key    = "sk-..."

# [provider.groq]
# model      = "llama-3.3-70b-versatile"
# max_tokens = 4096
# api_key    = "gsk_..."

# [provider.deepseek]
# model      = "deepseek-chat"
# max_tokens = 4096
# api_key    = "sk-..."

[tools]
screenshot      = true
touch           = true
key_event       = true
text_input      = true
sms             = true
call            = true
ui_dump         = true
shell           = true
filesystem      = true

[tools.filesystem_config]
allowed_paths = ["/data/peko", "/sdcard"]

[tools.shell_config]
timeout_seconds = 30

# Hardware — leave modem_device unset (or "auto") to let peko probe
# /dev/smd11 / /dev/smd1 / /dev/ttyUSB2 etc. at startup.
[hardware]
modem_device = "auto"

# Autonomy — start with propose-only so nothing runs without your OK.
# Flip propose_only=false after you've watched a week of proposals.
[autonomy]
enabled                     = true
tick_interval_secs          = 300
max_internal_tasks_per_hour = 4
max_internal_tasks_per_day  = 20
max_tokens_per_day          = 50000
propose_only                = true
memory_gardener             = true
memory_gardener_cron        = "0 6 * * *"
reflection                  = true
curiosity                   = 0.10
goal_generation             = true
