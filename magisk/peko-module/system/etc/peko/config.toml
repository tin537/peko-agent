[agent]
max_iterations = 20
context_window = 32768
history_share  = 0.7
data_dir       = "/data/peko"
log_level      = "info"

[provider]
# Dual brain: local daemon (UDS) + Anthropic cloud for escalation.
# The daemon is optional — if the GGUF model isn't present, peko
# falls back to cloud-only.
brain    = "local:anthropic"
priority = ["anthropic"]

[provider.local]
model      = "embedded"
base_url   = "unix://@peko-llm"
max_tokens = 512

[provider.anthropic]
model      = "claude-sonnet-4-20250514"
max_tokens = 4096
# api_key injected via ANTHROPIC_API_KEY env var (see service.sh if set)

[tools]
screenshot      = true
touch           = true
key_event       = true
text_input      = true
sms             = true
call            = true
ui_dump         = true
shell           = true
filesystem      = true

[tools.filesystem_config]
allowed_paths = ["/data/peko", "/sdcard"]

[tools.shell_config]
timeout_seconds = 30

# Hardware — leave modem_device unset (or "auto") to let peko probe
# /dev/smd11 / /dev/smd1 / /dev/ttyUSB2 etc. at startup.
[hardware]
modem_device = "auto"

# Autonomy — start with propose-only so nothing runs without your OK.
# Flip propose_only=false after you've watched a week of proposals.
[autonomy]
enabled                     = true
tick_interval_secs          = 300
max_internal_tasks_per_hour = 4
max_internal_tasks_per_day  = 20
max_tokens_per_day          = 50000
propose_only                = true
memory_gardener             = true
memory_gardener_cron        = "0 6 * * *"
reflection                  = true
curiosity                   = 0.10
goal_generation             = true
